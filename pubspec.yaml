name: milk_collector
description: Agil Coleta Leite - Gestão de rotas, tanques e produtores rurais
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3
  http: 1.5.0
  intl: ^0.19.0
  uuid: ^4.5.1
  geolocator: ^13.0.2
  permission_handler: ^11.4.0
  path_provider: ^2.1.5
  csv: ^6.0.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  flutter_slidable: ^3.1.1
  fl_chart: ^0.70.2
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
